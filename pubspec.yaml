name: iCa
description: iCa - Quản lý báo giá hải sản
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & utils
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  intl: 0.20.2
  image_picker: ^1.1.2
  uuid: ^4.4.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  device_preview: ^1.3.1

generate: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#9333EA"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
